<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="text-scale" content="scale" />
		<meta name="theme-color" content="#131718" />
		<title>Cenko</title>
		<meta name="description" content="Cenko aggregates grocery deals from all major Slovenian stores, tracks your spending, and helps you shop smarter." />
		<meta name="keywords" content="grocery deals, Slovenia, Mercator, Spar, Hofer, Tuš, shopping list, spending tracker" />

		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="crossorigin" />
		<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

		<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
		<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
		<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
		<link rel="icon" href="/favicon.ico" sizes="any" />
		<link rel="manifest" href="/site.webmanifest" />

		<style>
			html,
			body {
				margin: 0;
				background: #131718;
				color: #e4e8e8;
			}

			html {
				color-scheme: dark;
			}
		</style>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
